<div class="bg-white rounded-lg border border-gray-200 p-6">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold text-[#1F2937]">Участники команды</h2>
        <button id="inviteMemberBtn" class="px-4 py-2 bg-[#2563EB] text-white rounded-lg hover:bg-[#1d4ed8] transition-colors text-sm font-medium">
            <i class="fas fa-plus mr-2"></i>Пригласить участника
        </button>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
                <tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Email</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Роль</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Действия</th></tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr><td class="px-6 py-4 text-sm text-gray-900">elena@code2guide.ru</td><td class="px-6 py-4"><span class="px-2.5 py-0.5 bg-purple-100 text-purple-700 rounded-full text-xs font-medium">Владелец</span></td><td class="px-6 py-4"></td></tr>
                <tr><td class="px-6 py-4 text-sm text-gray-900">ivan@company.ru</td><td class="px-6 py-4"><span class="px-2.5 py-0.5 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">Администратор</span></td><td class="px-6 py-4"><button class="px-3 py-1 text-sm text-red-600 hover:bg-red-50 rounded transition-colors">Удалить</button></td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Invite Modal -->
<div id="inviteModal" class="fixed inset-0 z-50 hidden bg-black/50 flex items-center justify-center p-4">
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-semibold text-[#1F2937]">Пригласить участника</h3>
            <button onclick="closeInviteModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Email</label><input type="email" id="inviteEmail" placeholder="user@example.com" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Роль</label><select id="inviteRole" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg"><option>Администратор</option><option>Разработчик</option><option>Просмотр</option></select></div>
            <div class="flex gap-3 pt-4"><button onclick="sendInvite()" class="flex-1 px-4 py-2.5 bg-[#2563EB] text-white rounded-lg hover:bg-[#1d4ed8] transition-colors font-medium">Отправить приглашение</button><button onclick="closeInviteModal()" class="px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-medium">Отмена</button></div>
        </div>
    </div>
</div>

<script>
    const inviteModal = document.getElementById('inviteModal');
    function openInviteModal() { inviteModal.classList.remove('hidden'); }
    function closeInviteModal() { inviteModal.classList.add('hidden'); }
    document.getElementById('inviteMemberBtn')?.addEventListener('click', openInviteModal);
    function sendInvite() { closeInviteModal(); showToast('Приглашение отправлено'); }
</script>
