<div class="space-y-6">
    <div class="bg-white rounded-lg border border-gray-200 p-6">
        <h2 class="text-xl font-semibold text-[#1F2937] mb-6">Email-уведомления</h2>
        <div class="space-y-4">
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" id="notifyGenerations" checked class="mt-1 w-4 h-4 text-[#2563EB] border-gray-300 rounded">
                <div>
                    <span class="font-medium text-[#1F2937]">Новые генерации</span>
                    <p class="text-sm text-gray-600 mt-0.5">Получать уведомления о завершении генерации документации</p>
                </div>
            </label>
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" id="notifyDigest" checked class="mt-1 w-4 h-4 text-[#2563EB] border-gray-300 rounded">
                <div>
                    <span class="font-medium text-[#1F2937]">Еженедельный дайджест</span>
                    <p class="text-sm text-gray-600 mt-0.5">Статистика использования и новые функции каждую неделю</p>
                </div>
            </label>
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" id="notifyMarketing" class="mt-1 w-4 h-4 text-[#2563EB] border-gray-300 rounded">
                <div>
                    <span class="font-medium text-[#1F2937]">Маркетинговые рассылки</span>
                    <p class="text-sm text-gray-600 mt-0.5">Новости продукта, акции и специальные предложения</p>
                </div>
            </label>
        </div>
    </div>

    <div class="bg-white rounded-lg border border-gray-200 p-6">
        <h2 class="text-xl font-semibold text-[#1F2937] mb-4">Telegram-уведомления</h2>
        <div class="space-y-4">
            <div class="flex items-center gap-2">
                <span class="text-sm text-gray-500">Статус:</span>
                <span class="px-2.5 py-0.5 bg-gray-100 text-gray-700 rounded-full text-xs font-medium">Не подключен</span>
            </div>
            <div class="flex gap-3">
                <div class="flex-1">
                    <input type="text" placeholder="@username" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg">
                </div>
                <button class="px-4 py-2.5 bg-[#2563EB] text-white rounded-lg hover:bg-[#1d4ed8] transition-colors font-medium">
                    Подключить
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-lg border border-gray-200 p-6">
        <h2 class="text-xl font-semibold text-[#1F2937] mb-6">Частота уведомлений</h2>
        <div class="space-y-3">
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="radio" name="frequency" value="instant" checked class="w-4 h-4 text-[#2563EB] border-gray-300">
                <span class="text-[#1F2937]">Мгновенно</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="radio" name="frequency" value="hourly" class="w-4 h-4 text-[#2563EB] border-gray-300">
                <span class="text-[#1F2937]">Раз в час</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="radio" name="frequency" value="daily" class="w-4 h-4 text-[#2563EB] border-gray-300">
                <span class="text-[#1F2937]">Раз в день</span>
            </label>
        </div>
    </div>

    <button id="saveNotificationsBtn" class="px-6 py-2.5 bg-[#2563EB] text-white rounded-lg hover:bg-[#1d4ed8] transition-colors font-medium">
        Сохранить настройки
    </button>
</div>

<script>
    document.getElementById('saveNotificationsBtn')?.addEventListener('click', function() {
        showToast('Настройки уведомлений сохранены');
    });
</script>
