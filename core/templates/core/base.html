<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Code2Guide - {% block title %}Мои проекты{% endblock %}</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563EB;
            --primary-hover: #1d4ed8;
            --background: #F9FAFB;
            --surface: #FFFFFF;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 24px;
            width: 24px;
            height: 24px;
        }

        .nav-menu {
            padding: 16px 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-item:hover {
            background-color: #F3F4F6;
            color: var(--text-primary);
        }

        .nav-item.active {
            background-color: #EFF6FF;
            color: var(--primary);
        }

        .nav-icon i {
            width: 20px;
            height: 20px;
            font-size: 18px;
            text-align: center;
        }

        /* Main content */
        .main {
            flex: 1;
            margin-left: 280px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 32px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .user-menu:hover {
            background-color: #F3F4F6;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        .user-email {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        /* Content */
        .content {
            padding: 32px;
        }

        /* Page header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary i {
            font-size: 14px;
            width: 14px;
            height: 14px;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            padding: 6px 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline i {
            font-size: 13px;
            width: 13px;
            height: 13px;
        }

        .btn-outline:hover {
            background-color: #F3F4F6;
            border-color: var(--border);
        }

        .btn-icon {
            padding: 8px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon i {
            font-size: 18px;
            width: 18px;
            height: 18px;
        }

        .btn-icon:hover {
            background-color: #F3F4F6;
            color: var(--primary);
        }

        /* Projects grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .project-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
        }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(37, 99, 235, 0.3);
        }

        .project-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .project-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .project-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background-color: #EFF6FF;
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #22C55E;
            border-radius: 50%;
        }

        .status-text {
            font-size: 12px;
            color: #166534;
            font-weight: 500;
        }

        .project-stats {
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .project-stats p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .project-stats strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .project-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-actions i {
            font-size: 14px;
            width: 14px;
            height: 14px;
        }

        /* Table */
        .table-container {
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #F9FAFB;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }

        th i {
            margin-right: 6px;
            font-size: 12px;
            width: 12px;
            height: 12px;
            color: var(--text-muted);
        }

        tr:hover td {
            background-color: #F9FAFB;
        }

        .status-completed {
            background-color: #DCFCE7;
            color: #166534;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-completed i {
            font-size: 10px;
            width: 10px;
            height: 10px;
        }

        .status-in_progress {
            background-color: #FEF3C7;
            color: #92400E;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-in_progress i {
            font-size: 10px;
            width: 10px;
            height: 10px;
        }

        .action-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-link i {
            font-size: 12px;
            width: 12px;
            height: 12px;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        /* Empty state */
        .empty-state {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 60px 40px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .empty-state-icon i {
            font-size: 64px;
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .empty-state-description {
            color: var(--text-secondary);
            margin-bottom: 28px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Mobile menu */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 200;
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 20px;
        }

        .mobile-menu-btn i {
            font-size: 20px;
            width: 20px;
            height: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }

            .main {
                margin-left: 0;
            }

            .mobile-menu-btn {
                display: block;
            }

            .header {
                padding-left: 72px;
            }

            .content {
                padding: 20px;
            }

            .page-title {
                font-size: 24px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1440px) {
            .content {
                max-width: 1400px;
                margin: 0 auto;
                width: 100%;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
    <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo">
                    <i class="fas fa-code"></i>
                    Code2Guide
                </a>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item {% if active_menu == 'projects' %}active{% endif %}">
                    <span class="nav-icon"><i class="fas fa-folder-open"></i></span>
                    <span>Проекты</span>
                </a>
                <a href="/history/" class="nav-item {% if active_menu == 'history' %}active{% endif %}">
                    <span class="nav-icon"><i class="fas fa-history"></i></span>
                    <span>История генераций</span>
                </a>
                <a href="/settings/" class="nav-item {% if active_menu == 'settings' %}active{% endif %}">
                    <span class="nav-icon"><i class="fas fa-sliders-h"></i></span>
                    <span>Настройки аккаунта</span>
                </a>
                <a href="/logout/" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
                    <span>Выйти</span>
                </a>
            </nav>
        </aside>

        <main class="main">
            <header class="header">
                <div class="user-menu">
                    <div class="user-info">
                        <div class="user-name">{{ user.name|default:"Моя компания" }}</div>
                        <div class="user-email">{{ user.email|default:"admin@company.com" }}</div>
                    </div>
                    <div class="avatar">
                        {{ user.name|slice:":1"|default:"М" }}
                    </div>
                </div>
            </header>

            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.querySelector('.mobile-menu-btn');
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(event.target) && !menuBtn.contains(event.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
