<div class="bg-white rounded-lg border border-gray-200 p-6">
    <h2 class="text-xl font-semibold text-[#1F2937] mb-6">Информация профиля</h2>

    <form id="profileForm" class="space-y-6">
        {% csrf_token %}

        <!-- Avatar -->
        <div class="flex items-center gap-6">
            <div class="w-24 h-24 bg-[#2563EB] rounded-full flex items-center justify-center text-white text-2xl font-semibold">
                {% if user.avatar %}
                    <img src="{{ user.avatar }}" alt="Avatar" class="w-full h-full rounded-full object-cover">
                {% else %}
                    {{ user.name|slice:":1"|default:"М" }}{{ user.last_name|slice:":1"|default:"" }}
                {% endif %}
            </div>
            <div class="flex flex-col gap-2">
                <button type="button" id="uploadAvatarBtn" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors text-sm font-medium">
                    <i class="fas fa-upload w-4 h-4 mr-2"></i>
                    Загрузить новое фото
                </button>
                <input type="file" id="avatarInput" name="avatar" accept="image/png,image/jpeg" class="hidden">
                <button type="button" id="removeAvatarBtn" class="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors text-sm font-medium hidden">
                    Удалить
                </button>
            </div>
        </div>

        <!-- Form Fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Имя <span class="text-red-500">*</span>
                </label>
                <input type="text" id="firstName" name="first_name" value="{{ user.first_name|default:'Елена' }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#2563EB]/20 focus:border-[#2563EB] transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Фамилия <span class="text-red-500">*</span>
                </label>
                <input type="text" id="lastName" name="last_name" value="{{ user.last_name|default:'Румянцева' }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#2563EB]/20 focus:border-[#2563EB] transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Должность</label>
                <input type="text" id="position" name="position" value="{{ user.position|default:'' }}"
                    placeholder="Например, Product Manager"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#2563EB]/20 focus:border-[#2563EB] transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Email <span class="text-red-500">*</span>
                </label>
                <input type="email" id="email" name="email" value="{{ user.email|default:'elena@code2guide.ru' }}" readonly
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed">
                <p class="text-xs text-gray-500 mt-1">Для смены email свяжитесь с поддержкой</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Телефон</label>
                <input type="tel" id="phone" name="phone" value="{{ user.phone|default:'+7 (999) 123-45-67' }}"
                    placeholder="+7 (999) 123-45-67"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#2563EB]/20 focus:border-[#2563EB] transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Компания</label>
                <input type="text" id="company" name="company" value="{{ user.company|default:'Code2Guide' }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#2563EB]/20 focus:border-[#2563EB] transition-colors">
            </div>
        </div>

        <!-- Bio -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">О себе</label>
            <textarea id="bio" name="bio" rows="4"
                placeholder="Расскажите немного о себе и своей компании"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#2563EB]/20 focus:border-[#2563EB] transition-colors resize-none">{{ user.bio|default:'' }}</textarea>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3 pt-4 border-t border-gray-200">
            <button type="submit" class="px-6 py-2.5 bg-[#2563EB] text-white rounded-lg hover:bg-[#1d4ed8] transition-colors font-medium">
                Сохранить изменения
            </button>
            <button type="button" id="cancelProfileBtn" class="px-6 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-medium">
                Отмена
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('profileForm');
        const uploadBtn = document.getElementById('uploadAvatarBtn');
        const avatarInput = document.getElementById('avatarInput');
        const removeAvatarBtn = document.getElementById('removeAvatarBtn');
        const cancelBtn = document.getElementById('cancelProfileBtn');

        let originalData = {};

        // Сохраняем исходные данные
        function saveOriginalData() {
            originalData = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                position: document.getElementById('position').value,
                phone: document.getElementById('phone').value,
                company: document.getElementById('company').value,
                bio: document.getElementById('bio').value
            };
        }
        saveOriginalData();

        // Отмена изменений
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function() {
                document.getElementById('firstName').value = originalData.first_name;
                document.getElementById('lastName').value = originalData.last_name;
                document.getElementById('position').value = originalData.position;
                document.getElementById('phone').value = originalData.phone;
                document.getElementById('company').value = originalData.company;
                document.getElementById('bio').value = originalData.bio;
            });
        }

        // Загрузка аватара
        if (uploadBtn && avatarInput) {
            uploadBtn.addEventListener('click', function() {
                avatarInput.click();
            });

            avatarInput.addEventListener('change', function(e) {
                if (e.target.files[0]) {
                    const file = e.target.files[0];
                    if (file.size > 2 * 1024 * 1024) {
                        alert('Файл слишком большой. Максимум 2 МБ');
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const avatarDiv = document.querySelector('.w-24.h-24');
                        avatarDiv.innerHTML = `<img src="${e.target.result}" alt="Avatar" class="w-full h-full rounded-full object-cover">`;
                        if (removeAvatarBtn) removeAvatarBtn.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // Отправка формы
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const formData = new FormData();
                formData.append('first_name', document.getElementById('firstName').value);
                formData.append('last_name', document.getElementById('lastName').value);
                formData.append('position', document.getElementById('position').value);
                formData.append('phone', document.getElementById('phone').value);
                formData.append('company', document.getElementById('company').value);
                formData.append('bio', document.getElementById('bio').value);

                const avatarFile = document.getElementById('avatarInput').files[0];
                if (avatarFile) {
                    formData.append('avatar', avatarFile);
                }

                try {
                    const response = await fetch('/api/profile/update/', {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                        },
                        body: formData
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showToast('Изменения сохранены');
                        saveOriginalData();
                    } else {
                        showToast(data.error || 'Ошибка сохранения', false);
                    }
                } catch (error) {
                    showToast('Ошибка соединения', false);
                }
            });
        }
    });
</script>
